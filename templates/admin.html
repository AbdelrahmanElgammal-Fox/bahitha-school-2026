<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم والإدارة | مدرسة باحثة البادية</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    
    body { 
      margin: 0; 
      padding: 0; 
      min-height: 100vh; 
      /* نفس الخلفية الصحراوية الدافئة المتناسقة مع هوية البادية */
      background: linear-gradient(rgba(139, 69, 19, 0.35), rgba(212, 141, 61, 0.45)), url('https://unsplash.com') no-repeat center center/cover; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
    }
    
    .admin-box { 
      background: rgba(255, 255, 255, 0.94); 
      padding: 40px 30px; 
      border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(92, 58, 26, 0.45); 
      width: 100%; 
      max-width: 550px; 
      text-align: center; 
      border: 2px solid #cc7a23; 
      backdrop-filter: blur(8px); 
      transform: translateY(0);
      transition: all 0.4s ease;
    }
    
    .admin-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 60px rgba(92, 58, 26, 0.55);
    }
    
    h2 { 
      color: #703d0b; 
      font-weight: 700; 
      font-size: 24px; 
      margin: 0 0 10px 0; 
    }
    
    p { 
      color: #b5651d; 
      font-weight: 600; 
      font-size: 15px; 
      margin: 0 0 25px 0;
      background: rgba(212, 141, 61, 0.1); 
      padding: 8px 15px; 
      border-radius: 12px;
      border: 1px solid rgba(212, 141, 61, 0.15);
    }
    
    .form-group { 
      margin-bottom: 20px; 
      text-align: right; 
    }
    
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: #5c3a1a; 
      font-weight: 700; 
      font-size: 14px; 
    }
    
    select, input[type=file] { 
      width: 100%; 
      padding: 13px; 
      border: 2px solid #e0d5c1; 
      border-radius: 12px; 
      font-size: 15px; 
      transition: all 0.3s ease; 
      background: #fffdfb; 
      text-align: right; 
      color: #333;
    }
    
    input[type=file] {
      background: #fdfaf4;
      cursor: pointer;
    }
    
    select:focus, input[type=file]:focus { 
      border-color: #cc7a23; 
      outline: none; 
      box-shadow: 0 0 0 4px rgba(212, 141, 61, 0.25); 
    }
    
    input[type=submit] { 
      width: 100%; 
      padding: 15px; 
      background: linear-gradient(135deg, #cc7a23, #e6a45e); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-size: 17px; 
      font-weight: 700; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      box-shadow: 0 6px 20px rgba(204, 122, 35, 0.4); 
    }
    
    input[type=submit]:hover { 
      background: linear-gradient(135deg, #b5651d, #cc7a23);
      box-shadow: 0 8px 25px rgba(204, 122, 35, 0.5); 
    }
    
    .flash-msg { 
      background: #e8f5e9; 
      color: #2e7d32; 
      padding: 12px; 
      border-radius: 8px; 
      font-weight: bold; 
      margin-bottom: 20px; 
      font-size: 14px;
      border-right: 4px solid #2e7d32;
      text-align: right; 
    }
    
    .footer { 
      margin-top: 30px; 
      color: #6b523b; 
      font-size: 13px; 
      border-top: 1px solid #ebd9c5; 
      padding-top: 15px; 
      font-weight: 600; 
    }
  </style>
</head>
<body>
  <div class="admin-box">
    <h2>لوحة تحكم إدارة المدرسة ⚙️ 🐪</h2>
    <p>اختر الصف الدراسي ثم ارفع ملف الـ Excel المطابق لتحديث النظام فوراً</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">✓ {{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/admin" enctype="multipart/form-data">
      <div class="form-group">
        <label>حدد الصف الدراسي المراد تحديث بياناته:</label>
        <select name="grade_level" required>
          <option value="">-- اضغط هنا لاختيار الصف --</option>
          <option value="1">الصف الأول الابتدائي</option>
          <option value="2">الصف الثاني الابتدائي</option>
          <option value="3">الصف الثالث الابتدائي</option>
          <option value="4">الصف الرابع الابتدائي</option>
          <option value="5">الصف الخامس الابتدائي</option>
          <option value="6">الصف السادس الابتدائي</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>اختر ملف الـ Excel النظيف من جهازك:</label>
        <input type="file" name="excel_file" accept=".xlsx, .xls" required>
      </div>
      
      <input type="submit" value="بدء رفع وتحديث قاعدة البيانات الموحدة 🚀">
    </form>
    <div class="footer">Developed by <b>Abdelrhman Elgammal 🐪</b> © 2026</div>
  </div>
</body>
</html>
